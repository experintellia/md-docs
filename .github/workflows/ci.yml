# Typecheck, lint and build on every push and pull request.
name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 24: runs the TS test files directly via native type stripping (node --test).
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci
      - name: Test (typecheck + lint + unit)
        run: npm test
      - name: Build
        run: npm run build
