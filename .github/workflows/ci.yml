# Typecheck, lint and build on every push and pull request.
name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 24: runs the TS test files directly via native type stripping (node --test).
          node-version: 24
          cache: npm
      - name: Install
        # Not `npm ci`: a nested vite@8 → rolldown subtree pulls an optional
        # wasm32 binding whose @emnapi deps are pruned from the lock on x64,
        # leaving dangling refs that `npm ci` rejects. `npm install` tolerates
        # it and resolves from the lock all the same.
        # ponytail: drop this back to `npm ci` once the lock subtree is consistent.
        run: npm install --no-audit --no-fund
      - name: Test (typecheck + lint + unit)
        run: npm test
      - name: Build
        run: npm run build
