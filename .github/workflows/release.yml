# Build the .xdc and attach it to a GitHub Release when a vX.Y.Z tag is pushed.
name: Release .xdc
on:
  push:
    tags:
      - 'v*.*.*'
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 24: `npm test` runs the .ts test files directly via native type
          # stripping (node --test), which needs Node 24. Match ci.yml.
          node-version: 24
          cache: npm
      - name: Install
        # See ci.yml: nested vite@8/rolldown optional wasm32 subtree breaks
        # `npm ci`; `npm install` resolves from the lock and tolerates it.
        run: npm install --no-audit --no-fund
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*.xdc
          fail_on_unmatched_files: true
