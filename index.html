<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="/icon.png">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/live-preview.css">
  <!-- `<title>` is ignored by the webxdc environment, see
       https://docs.webxdc.org/spec.html#discouraged-practises -->
  <title>MD-Docs</title>
  <meta name="description" content="Collaborative markdown editor">
  <!-- webxdc.js is provided by the messenger implementation (and webxdc-dev). -->
  <script src="./webxdc.js"></script>
</head>
<body>
  <div id="app">
    <div id="toolbar"></div>
    <div id="editor"></div>
  </div>
  <script>
    (function () {
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const setting = localStorage.getItem('color-schema') || 'auto';
      if (setting === 'dark' || (prefersDark && setting !== 'light'))
        document.documentElement.classList.toggle('dark', true);
    })();
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
